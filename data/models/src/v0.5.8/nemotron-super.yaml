# NVIDIA Nemotron3-Super Model Configurations (Simplified Format)
# This file is compiled to data/models/generated/v0.5.8/nemotron-super.yaml
# TODO: Update model_path and family details when the public model name is available.

vendor: nvidia

defaults:
  hardware:
    H200: { tp: 4 }
    B200: { tp: 4 }
  configurations:
    - name: default-kv-fp8
      nodes: single
      optimization: balanced
      extra_args:
        - --trust-remote-code
        - --kv-cache-dtype
        - fp8_e4m3
    - name: default-kv-bf16
      nodes: single
      optimization: balanced
      extra_args:
        - --trust-remote-code
        - --kv-cache-dtype
        - bf16

families:
  - name: Nemotron-3-Super
    description: NVIDIA Nemotron3-Super model
    llm:
      thinking_capability: hybrid
      tool_parser: qwen3_coder
      reasoning_parser: nemotron_3

    models:
      - name: Nemotron3-Super
        model_path: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16
        quantization: bf16
