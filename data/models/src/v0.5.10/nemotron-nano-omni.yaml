# NVIDIA Nemotron 3 Nano Omni Model Configurations (Simplified Format)
# This file is compiled to data/models/generated/v0.5.10/nemotron-nano-omni.yaml

vendor: nvidia

defaults:
  hardware:
    H100: { tp: 4 }
    H200: { tp: 4 }
    B200: { tp: 2 }
    A100: { tp: 4 }
    L40S: { tp: 4 }
  configurations:
    - name: default
      nodes: single
      optimization: balanced
      extra_args:
        - --trust-remote-code
        - --kv-cache-dtype
        - fp8_e4m3
    - name: tp2
      nodes: single
      optimization: balanced
      tp: 2
      extra_args:
        - --trust-remote-code
        - --kv-cache-dtype
        - fp8_e4m3
    - name: tp4
      nodes: single
      optimization: balanced
      tp: 4
      extra_args:
        - --trust-remote-code
        - --kv-cache-dtype
        - fp8_e4m3
    - name: tp8
      nodes: single
      optimization: balanced
      tp: 8
      extra_args:
        - --trust-remote-code
        - --kv-cache-dtype
        - fp8_e4m3
    - name: default-kv-bf16
      nodes: single
      optimization: balanced
      extra_args:
        - --trust-remote-code
        - --kv-cache-dtype
        - bf16

families:
  - name: Nemotron-3-Nano-Omni
    description: NVIDIA Nemotron 3 Nano Omni multimodal model (30B total, 3B active) supporting text, image, video, and audio
    llm:
      thinking_capability: hybrid
      tool_parser: qwen3_coder
      reasoning_parser: deepseek-r1

    models:
      # Reasoning variant (RL post-trained, recommended)
      - name: Nemotron-3-Nano-Omni-30B-A3B-Reasoning
        model_path: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning
        quantization: bf16

      # BF16 base variant
      - name: Nemotron-3-Nano-Omni-30B-A3B-BF16
        model_path: nvidia/Nemotron-3-Nano-Omni-30B-A3B-BF16
        quantization: bf16

      # FP8 variant
      - name: Nemotron-3-Nano-Omni-30B-A3B-FP8
        model_path: nvidia/Nemotron-3-Nano-Omni-30B-A3B-FP8
        quantization: fp8

      # NVFP4 variant — Blackwell-only (B200)
      - name: Nemotron-3-Nano-Omni-30B-A3B-NVFP4
        model_path: nvidia/Nemotron-3-Nano-Omni-30B-A3B-NVFP4
        quantization: nvfp4
        hardware:
          B200: {}
