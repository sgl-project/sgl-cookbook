# Qwen3.6 Model Configurations (Simplified Format)
# This file is compiled to data/models/generated/v0.5.10/qwen36.yaml
#
# Qwen3.6-35B-A3B: MoE (35B total, 3B active)
# Gated DeltaNet + sparse MoE hybrid architecture
#
# GPU requirements (BF16, ~70GB):
#   H100: tp=1, H200: tp=1, B200: tp=1
#
# GPU requirements (FP8, ~35GB):
#   H100: tp=1, H200: tp=1, B200: tp=1

vendor: qwen

defaults:
  hardware:
    H100: { tp: 1 }
    H200: { tp: 1 }
    B200: { tp: 1 }
  configurations:
    - name: default
      nodes: single
      optimization: balanced
    - name: speculative-mtp
      nodes: single
      optimization: low-latency
      extra_args:
        - --speculative-algo
        - NEXTN
        - --speculative-num-steps
        - "3"
        - --speculative-eagle-topk
        - "1"
        - --speculative-num-draft-tokens
        - "4"

families:
  - name: Qwen3.6
    description: Qwen3.6 35B (3B active) MoE VLM with hybrid reasoning, agentic coding, tool calling, and multimodal capabilities
    llm:
      thinking_capability: hybrid
      tool_parser: qwen3_coder
      reasoning_parser: qwen3

    models:
      - name: Qwen3.6-35B-A3B
        quantization: bf16

      - name: Qwen3.6-35B-A3B-FP8
        quantization: fp8
